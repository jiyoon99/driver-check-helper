name: Pester Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure Pester
        shell: pwsh
        run: |
          $requiredVersion = "4.10.1"
          $module = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -eq [version]$requiredVersion } |
            Select-Object -First 1
          if (-not $module) {
            Install-Module Pester -RequiredVersion $requiredVersion -Force -SkipPublisherCheck -Scope CurrentUser
          }

      - name: Run Pester tests
        shell: pwsh
        run: pwsh -NoProfile -File .\tests\Run-Tests.ps1
